workflows:
  android-release:
    name: WAArchiver APK
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Build APK
        script: |
          cd $CM_BUILD_DIR
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
